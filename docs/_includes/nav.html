<header class="site-header">
  <div class="container">
    <nav class="site-nav" aria-label="Primary">
      <a href="{{ '/' | relative_url }}" class="site-brand">{{ site.title | split: " — " | last | default: site.title }}</a>
      <ul class="nav-links">
        {%- for item in site.data.navigation.primary -%}
          <li>
            <a href="{{ item.url | relative_url }}"
               {% if page.url == item.url or page.url contains item.match %}class="active"{% endif %}>
              {{ item.title }}
            </a>
          </li>
        {%- endfor -%}
      </ul>
    </nav>
  </div>
</header>
