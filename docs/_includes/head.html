<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0d1117">

{%- if page.title -%}
  <title>{{ page.title | escape }} — {{ site.title | escape }}</title>
{%- else -%}
  <title>{{ site.title | escape }}</title>
{%- endif -%}

<meta name="description" content="{{ page.description | default: page.tldr | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">
<meta name="author" content="{{ site.author.name }}">

{%- if page.canonical_url -%}
<link rel="canonical" href="{{ page.canonical_url }}">
{%- else -%}
<link rel="canonical" href="{{ page.url | absolute_url }}">
{%- endif -%}

<!-- Open Graph -->
<meta property="og:site_name" content="{{ site.title | escape }}">
<meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
<meta property="og:title" content="{{ page.title | default: site.title | escape }}">
<meta property="og:description" content="{{ page.description | default: page.tldr | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:image" content="{{ '/assets/img/social-preview.png' | absolute_url }}">
{%- if page.date -%}
<meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}">
<meta property="article:author" content="{{ site.author.name }}">
{%- endif -%}

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page.title | default: site.title | escape }}">
<meta name="twitter:description" content="{{ page.description | default: page.tldr | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">
<meta name="twitter:image" content="{{ '/assets/img/social-preview.png' | absolute_url }}">
{%- if site.author.twitter -%}
<meta name="twitter:creator" content="@{{ site.author.twitter }}">
{%- endif -%}

<!-- Stylesheet -->
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap">

<!-- Feeds -->
<link rel="alternate" type="application/atom+xml" title="{{ site.title }} Feed" href="{{ '/feed.xml' | relative_url }}">

<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="{{ '/assets/img/logo.svg' | relative_url }}">

{%- seo title=false -%}
