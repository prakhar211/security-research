<!--
  Timeline Visualization — reusable include for blog posts.

  Usage:
    {% include timeline-visual.html
       events="Aug 2023: Tycoon2FA first observed|Apr 2025: Anti-detection update|Mar 4, 2026: Europol disruption"
       highlights="2|"
       title="Campaign Timeline"
    %}

  Parameters:
    title      — heading (optional)
    events     — pipe-separated "date: description" entries
    highlights — pipe-separated indices (0-based) to highlight in red (optional)
-->
{% assign event_list = include.events | split: "|" %}
{% assign highlight_list = include.highlights | split: "|" %}
{% assign event_count = event_list.size %}
{% assign svg_height = event_count | times: 70 | plus: 60 %}

<figure class="timeline-visual" role="img" aria-label="{{ include.title | default: 'Timeline' }}">
  {% if include.title %}<figcaption class="timeline-title" style="font-family:'JetBrains Mono',monospace;font-size:0.95rem;color:var(--accent,#00e5a0);margin-bottom:0.75rem;">// {{ include.title | upcase }}</figcaption>{% endif %}
  <svg viewBox="0 0 700 {{ svg_height }}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:700px;height:auto;display:block;margin:0 auto 1.5rem;">
    <style>
      .tl-line { stroke: #333; stroke-width: 3; }
      .tl-dot { stroke-width: 2; }
      .tl-date { font-family: 'JetBrains Mono', monospace; font-size: 12px; fill: var(--accent, #00e5a0); }
      .tl-desc { font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 13px; fill: #ccc; }
      .tl-highlight .tl-date { fill: #e74c3c; }
      .tl-highlight .tl-dot { fill: #e74c3c; stroke: #e74c3c; }
    </style>
    <!-- Vertical line -->
    <line class="tl-line" x1="120" y1="20" x2="120" y2="{{ svg_height | minus: 20 }}"/>
    {% for event in event_list %}
      {% assign i = forloop.index0 %}
      {% assign y = i | times: 70 | plus: 50 %}
      {% assign parts = event | split: ": " %}
      {% assign date_str = parts[0] %}
      {% assign desc = parts[1] %}
      {% assign is_highlight = false %}
      {% for h in highlight_list %}
        {% assign h_int = h | plus: 0 %}
        {% if h_int == i %}{% assign is_highlight = true %}{% endif %}
      {% endfor %}
      <g class="{% if is_highlight %}tl-highlight{% endif %}">
        <circle class="tl-dot" cx="120" cy="{{ y }}" r="6"
                fill="{% if is_highlight %}#e74c3c{% else %}var(--accent, #00e5a0){% endif %}"
                stroke="{% if is_highlight %}#e74c3c{% else %}var(--accent, #00e5a0){% endif %}"/>
        <text class="tl-date" x="105" y="{{ y | plus: 5 }}" text-anchor="end">{{ date_str | strip }}</text>
        <text class="tl-desc" x="140" y="{{ y | plus: 5 }}">{{ desc | strip }}</text>
      </g>
    {% endfor %}
  </svg>
</figure>
