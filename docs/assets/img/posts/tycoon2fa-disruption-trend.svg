    .annotation { font-family: -apple-system, sans-serif; font-size: 12px; fill: #e74c3c; text-anchor: middle; font-weight: bold; }
    .anno-line { stroke: #e74c3c; stroke-width: 1.5; stroke-dasharray: 4,3; }
    .title { font-family: 'JetBrains Mono', monospace; font-size: 13px; fill: #00e5a0; font-weight: bold; }
