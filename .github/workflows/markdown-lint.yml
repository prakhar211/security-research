name: Markdown Lint & Link Check

on:
  push:
    branches: [main]
    paths:
      - "docs/**/*.md"
      - "docs/**/*.html"
      - ".github/workflows/markdown-lint.yml"
      - ".markdownlint.jsonc"
  pull_request:
    branches: [main]
    paths:
      - "docs/**/*.md"
      - "docs/**/*.html"

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "docs/_posts/**/*.md"

  link-check:
    runs-on: ubuntu-latest
    needs: markdownlint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: docs

      - name: Build Jekyll site
        run: bundle exec jekyll build
        working-directory: docs

      - name: HTML Proofer
        run: |
          gem install html-proofer
          htmlproofer ./docs/_site \
            --disable-external \
            --ignore-missing-alt-src \
            --ignore-urls "/^https:\/\/attack\.mitre\.org/,/^https:\/\/github\.com\/username/"
